<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato: GoodPay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;1,300&display=swap"
        rel="stylesheet">
</head>

<body style="font-family: Montserrat;">
    <header>
        <!--Barra de Navegação-->
        <section id="navegacao">
            <nav>
                <ul>
                    <li><a href="/index.html#home">Home</a></li>
                    <li><a href="/index.html#sobrenos">Sobre Nós</a></li>
                    <li><a href="/index.html#noticias">Notícias</a></li>
                    <li><a href="/index.html#empresas">Empresas</a></li>
                </ul>
            </nav>
        </section>
    </header>
    <main>
        <form action="">
            <p>
                <label for="nome">Nome: </label>
                <input type="text" name="nome" id="nome" placeholder="Digite seu nome...">
            </p>
            <p>
                <label for="email">E-mail: </label>
                <input type="email" name="email" id="email" placeholder="Digite seu e-mail...">
            </p>
            <p>
                <label for="mensagem">Mensagem: </label><br />
                <textarea name="mensagem" id="mensagem" cols="30" rows="10"
                    placeholder="Digite sua mensagem..."></textarea>
            </p>
            <p>
                <input type="submit" value="Enviar">
            </p>
        </form>
    </main>
    <footer>
        <table style="width: 100%; text-align: center; height: 90px;">
            <tr>
                <td>Atualizado em março de 2026</td>
                <td>Direitos reservados ao 2H3</td>
                <td>Etec Matão,  Av. Cesário Motta, 644 Centro Matão - SP</td>
            </tr>
        </table>
    </footer>
</body>

</html>
